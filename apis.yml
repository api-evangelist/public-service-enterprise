aid: public-service-enterprise
name: Public Service Enterprise Group
description: >-
  Public Service Enterprise Group (PSEG) is a publicly traded diversified energy
  holding company headquartered in Newark, New Jersey. Through its subsidiaries
  including PSE&G and PSEG Power, the company provides regulated electric and
  natural gas distribution and operates electric power generation across the
  northeastern United States. PSEG is a Fortune 500 company. No public developer
  APIs or developer portal have been identified at this time.
